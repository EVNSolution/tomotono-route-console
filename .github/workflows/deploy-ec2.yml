name: deploy-ec2

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Git branch to deploy
        required: false
        default: main
      ssm_target_key:
        description: SSM target key, for example tag:Service
        required: false
        default: tag:Service
      ssm_target_value:
        description: SSM target value
        required: false
        default: tomotono-route-console
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || vars.TOMOTONO_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_REGION: ${{ vars.TOMOTONO_AWS_REGION || 'ca-central-1' }}
      DEPLOY_ROLE_ARN: ${{ vars.TOMOTONO_AWS_ROLE_ARN || secrets.TOMOTONO_AWS_ROLE_ARN || vars.PROD_AWS_ROLE_ARN || secrets.PROD_AWS_ROLE_ARN || vars.GH_ACTIONS_PROD_DEPLOY_ROLE_ARN || secrets.GH_ACTIONS_PROD_DEPLOY_ROLE_ARN || secrets.GH_ACTIONS_INFRA_ROLE_ARN || secrets.GH_ACTIONS_DEV_DEPLOY_ROLE_ARN || secrets.GH_ACTIONS_STAGE_DEPLOY_ROLE_ARN || vars.ECR_BUILD_AWS_ROLE_ARN || secrets.ECR_BUILD_AWS_ROLE_ARN }}
      TOMOTONO_SSM_TARGET_KEY: ${{ github.event.inputs.ssm_target_key || vars.TOMOTONO_SSM_TARGET_KEY || 'tag:Service' }}
      TOMOTONO_SSM_TARGET_VALUE: ${{ github.event.inputs.ssm_target_value || vars.TOMOTONO_SSM_TARGET_VALUE || 'tomotono-route-console' }}
      TOMOTONO_DEPLOY_BRANCH: ${{ github.event.inputs.branch || vars.TOMOTONO_DEPLOY_BRANCH || github.ref_name }}
      TOMOTONO_DEPLOY_DIR: ${{ vars.TOMOTONO_DEPLOY_DIR || '/opt/tomotono-route-console' }}
      TOMOTONO_REPO_URL: https://github.com/EVNSolution/tomotono-route-console.git
      TOMOTONO_WAIT_FOR_COMPLETION: "true"
      TOMOTONO_ADMIN_PASSWORD: ${{ secrets.TOMOTONO_ADMIN_PASSWORD }}
      TOMOTONO_ADMIN_SESSION_TOKEN: ${{ secrets.TOMOTONO_ADMIN_SESSION_TOKEN }}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
      NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID }}
      GOOGLE_MAPS_SERVER_API_KEY: ${{ secrets.GOOGLE_MAPS_SERVER_API_KEY }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ env.TOMOTONO_DEPLOY_BRANCH }}
      - name: Validate deploy configuration
        run: |
          set -euo pipefail
          test -n "${DEPLOY_ROLE_ARN}" || { echo "Missing a supported AWS role ARN variable/secret for the prod environment." >&2; exit 1; }
          test -n "${AWS_REGION}" || { echo "Missing AWS region." >&2; exit 1; }
          echo "Deploy branch: ${TOMOTONO_DEPLOY_BRANCH}"
          echo "SSM target: ${TOMOTONO_SSM_TARGET_KEY}=${TOMOTONO_SSM_TARGET_VALUE}"
          echo "Deploy dir: ${TOMOTONO_DEPLOY_DIR}"
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          role-session-name: tomotono-route-console-deploy
      - name: Dispatch EC2 deploy through SSM
        run: scripts/dispatch-ec2-deploy-ssm.sh
