services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tomotono
      POSTGRES_PASSWORD: tomotono_dev_password
      POSTGRES_DB: tomotono_route_console
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://tomotono:tomotono_dev_password@db:5432/tomotono_route_console?schema=public
      APP_TIMEZONE: America/Toronto
      AWS_REGION: ca-central-1
    ports:
      - "3000:3000"
volumes:
  postgres-data:
