services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tomotono}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tomotono_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-tomotono_route_console}
    ports:
      - "5432:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-postgres-data}:/var/lib/postgresql/data
  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://tomotono:tomotono_dev_password@db:5432/tomotono_route_console?schema=public}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Toronto}
      AWS_REGION: ${AWS_REGION:-ca-central-1}
    ports:
      - "3000:3000"
  migrate:
    build:
      context: .
      target: migrator
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://tomotono:tomotono_dev_password@db:5432/tomotono_route_console?schema=public}
    profiles:
      - tools
volumes:
  postgres-data:
