services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tomotono}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tomotono_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-tomotono_route_console}
    ports:
      - "5432:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-postgres-data}:/var/lib/postgresql/data
  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://tomotono:tomotono_dev_password@db:5432/tomotono_route_console?schema=public}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Toronto}
      AWS_REGION: ${AWS_REGION:-ca-central-1}
    ports:
      - "3000:3000"
  caddy:
    image: caddy:2
    restart: "no"
    depends_on:
      - app
    env_file:
      - .env
    environment:
      CADDY_HOST: ${TOMATONO_SSLIP_HOST:-}
      CADDY_ADMIN_EMAIL: ${CADDY_ADMIN_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
    command:
      - sh
      - -c
      - if [ -z "$$CADDY_HOST" ]; then echo "TOMATONO_SSLIP_HOST not set; skip HTTPS proxy."; exit 0; fi; caddy run --config /etc/caddy/Caddyfile
    profiles:
      - sslip
  migrate:
    build:
      context: .
      target: migrator
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://tomotono:tomotono_dev_password@db:5432/tomotono_route_console?schema=public}
    profiles:
      - tools
volumes:
  postgres-data:
  caddy-data:
  caddy-config:
